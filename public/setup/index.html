<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalasi POSweb by Rsby</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white text-slate-900 p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-2xl border-t-8 border-blue-600 max-h-[90vh] overflow-y-auto custom-scroll">
        <div class="text-center mb-8 mt-2">
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">POSweb <span class="text-blue-600">Installer</span></h1>
            <p class="text-slate-500 text-sm font-semibold">Setup Database, Profil Toko & Akun Admin</p>
        </div>

        <div id="alertBox" class="hidden mb-6 p-4 rounded-xl font-bold text-sm text-center"></div>

        <div class="space-y-8">
            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                <h3 class="font-black text-slate-800 mb-4 border-b pb-2">1. Koneksi Database MySQL</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm font-bold">
                    <div><label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1.5">Host</label><input type="text" id="dbHost" value="127.0.0.1" class="w-full p-3 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                    <div><label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1.5">Nama Database</label><input type="text" id="dbName" value="db_posweb" class="w-full p-3 bg-blue-50 border border-blue-200 text-blue-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                    <div><label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1.5">Username DB</label><input type="text" id="dbUser" value="root" class="w-full p-3 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                    <div><label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1.5">Password DB</label><input type="password" id="dbPass" placeholder="Kosongkan jika tidak ada" class="w-full p-3 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                </div>
            </div>

            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                <h3 class="font-black text-slate-800 mb-4 border-b pb-2">2. Identitas Toko</h3>
                <div class="space-y-4 text-sm font-bold">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1.5">Nama Toko *</label><input type="text" id="tokoNama" placeholder="Misal: Toko Berkah" class="w-full p-3 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                        <div><label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1.5">Nomor Telepon</label><input type="text" id="tokoTelp" placeholder="08xxxxxxxx" class="w-full p-3 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                    </div>
                    <div><label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1.5">Alamat Lengkap</label><textarea id="tokoAlamat" rows="2" placeholder="Masukkan alamat toko" class="w-full p-3 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></textarea></div>
                </div>
            </div>

            <div class="bg-blue-50 p-5 rounded-2xl border border-blue-200">
                <h3 class="font-black text-blue-800 mb-4 border-b border-blue-200 pb-2">3. Buat Akun Admin Pertama</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm font-bold">
                    <div><label class="block text-blue-500 uppercase text-[10px] tracking-widest mb-1.5">Username *</label><input type="text" id="ownerUser" placeholder="admin" class="w-full p-3 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                    <div><label class="block text-blue-500 uppercase text-[10px] tracking-widest mb-1.5">Password *</label><input type="password" id="ownerPass" placeholder="Minimal 4 karakter" class="w-full p-3 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                </div>
            </div>
        </div>

        <button id="btnInstall" onclick="prosesInstalasi()" class="w-full bg-blue-600 text-white py-4 mt-8 rounded-xl font-black uppercase tracking-widest hover:bg-blue-700 shadow-xl active:scale-95 transition">
            Install Sistem
        </button>
    </div>

    <script>
        async function prosesInstalasi() {
            const btn = document.getElementById('btnInstall');
            const alert = document.getElementById('alertBox');
            
            const data = {
                dbHost: document.getElementById('dbHost').value,
                dbUser: document.getElementById('dbUser').value,
                dbPass: document.getElementById('dbPass').value,
                dbName: document.getElementById('dbName').value,
                tokoNama: document.getElementById('tokoNama').value,
                tokoAlamat: document.getElementById('tokoAlamat').value,
                tokoTelp: document.getElementById('tokoTelp').value,
                ownerUser: document.getElementById('ownerUser').value,
                ownerPass: document.getElementById('ownerPass').value
            };

            if(!data.tokoNama || !data.ownerUser || !data.ownerPass) {
                alert.className = "mb-6 p-4 rounded-xl font-bold text-sm text-center bg-red-100 text-red-700 border border-red-200";
                alert.innerText = "Error: Nama Toko, Username, dan Password WAJIB diisi!";
                alert.classList.remove('hidden');
                return;
            }

            btn.innerText = "MEMPROSES...";
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                const res = await fetch('/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const response = await res.json();

                if(res.ok) {
                    alert.className = "mb-6 p-4 rounded-xl font-bold text-sm text-center bg-green-100 text-green-700 border border-green-200";
                    alert.innerText = "Instalasi Sukses! Sedang mengalihkan...";
                    alert.classList.remove('hidden');
                    
                    // PAKSA HAPUS CACHE JAVASCRIPT BROWSER SUPAYA NGGAK NYANGKUT
                    localStorage.clear();
                    
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    alert.className = "mb-6 p-4 rounded-xl font-bold text-sm text-center bg-red-100 text-red-700 border border-red-200";
                    alert.innerText = response.pesan;
                    alert.classList.remove('hidden');
                    btn.innerText = "INSTALL SISTEM";
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                }
            } catch (err) {
                alert.className = "mb-6 p-4 rounded-xl font-bold text-sm text-center bg-red-100 text-red-700 border border-red-200";
                alert.innerText = "Server tidak merespons.";
                alert.classList.remove('hidden');
                btn.innerText = "INSTALL SISTEM";
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
