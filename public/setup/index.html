<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalasi Smart POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white text-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-lg border-t-8 border-blue-600">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">Instalasi Database</h1>
            <p class="text-slate-500 text-sm font-semibold">Hubungkan aplikasi POS ke MySQL Server</p>
        </div>

        <div id="alertBox" class="hidden mb-4 p-3 rounded-lg font-bold text-sm text-center"></div>

        <div class="space-y-4 text-sm font-bold">
            <div>
                <label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1">Database Host</label>
                <input type="text" id="dbHost" value="127.0.0.1" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1">Database Username</label>
                <input type="text" id="dbUser" value="root" placeholder="Misal: root / kasir" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1">Database Password</label>
                <input type="password" id="dbPass" placeholder="Kosongkan jika tidak ada password" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-slate-500 uppercase text-[10px] tracking-widest mb-1">Nama Database (Akan dibuat otomatis)</label>
                <input type="text" id="dbName" value="db_pos_smart" class="w-full p-3 bg-blue-50 border border-blue-200 text-blue-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <button id="btnInstall" onclick="prosesInstalasi()" class="w-full bg-blue-600 text-white py-4 mt-8 rounded-xl font-black uppercase tracking-widest hover:bg-blue-700 shadow-lg active:scale-95 transition">
            INSTALL & HUBUNGKAN
        </button>
    </div>

    <script>
        async function prosesInstalasi() {
            const btn = document.getElementById('btnInstall');
            const alert = document.getElementById('alertBox');
            
            const data = {
                dbHost: document.getElementById('dbHost').value,
                dbUser: document.getElementById('dbUser').value,
                dbPass: document.getElementById('dbPass').value,
                dbName: document.getElementById('dbName').value
            };

            btn.innerText = "MEMPROSES INSTALASI...";
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                const res = await fetch('/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const response = await res.json();

                if(res.ok) {
                    alert.className = "mb-4 p-3 rounded-lg font-bold text-sm text-center bg-green-100 text-green-700 border border-green-200";
                    alert.innerText = "Sistem Berhasil Diinstal! Mengalihkan ke Login...";
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    alert.className = "mb-4 p-3 rounded-lg font-bold text-sm text-center bg-red-100 text-red-700 border border-red-200";
                    alert.innerText = response.pesan;
                    btn.innerText = "INSTALL & HUBUNGKAN";
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                }
            } catch (err) {
                alert.className = "mb-4 p-3 rounded-lg font-bold text-sm text-center bg-red-100 text-red-700 border border-red-200";
                alert.innerText = "Server tidak merespon.";
                btn.innerText = "INSTALL & HUBUNGKAN";
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
